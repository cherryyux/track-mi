<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>life tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030303;
    --text: #cccccc;
    --dim: #333333;
    --border: #1a1a1a;
    --yoga: #E8175D;
    --dj: #BF0A3C;
    --web: #1A35CC;
    --dog: #A8D400;
    --home: #888888;
    --toki: #1A35CC;
    --code: #D94F00;
    --food: #F5C800;
    --cycle: #E8175D;
    --mood1: #ff3333;
    --mood2: #ff8800;
    --mood3: #ffee00;
    --mood4: #88ff00;
    --mood5: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 28px 20px 60px;
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 999;
  }

  .header {
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .header-left { display: flex; align-items: baseline; gap: 10px; }
  .prompt { color: var(--yoga); font-weight: 700; }
  .title { color: var(--text); font-size: 16px; font-weight: 700; }

  .cursor {
    display: inline-block;
    width: 7px; height: 13px;
    background: var(--yoga);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
  }

  .month-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 3px 8px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    transition: all 0.15s;
  }

  .month-nav button:hover { border-color: var(--dj); color: var(--dj); }
  .month-label { color: var(--text); font-weight: 700; min-width: 120px; text-align: center; }

  /* TRACKER TABLE */
  .tracker-wrap {
    overflow-x: auto;
    margin-bottom: 20px;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 700px;
  }

  th {
    padding: 6px 4px;
    text-align: center;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
    white-space: nowrap;
  }

  th.habit-label {
    text-align: left;
    padding-left: 8px;
    min-width: 120px;
    font-size: 10px;
  }

  td {
    padding: 2px;
    text-align: center;
    border-bottom: 1px solid #0a0a0a;
  }

  td.habit-name {
    text-align: left;
    padding: 5px 8px;
    font-size: 10px;
    white-space: nowrap;
    border-right: 1px solid var(--border);
  }

  .cell {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    background: #0d0d0d;
    border: 1px solid #111;
    transition: all 0.1s;
    margin: 1px;
  }

  .cell:hover { border-color: #333; transform: scale(1.1); }
  .cell.active { border-color: transparent; }
  .cell.today { border-color: var(--text) !important; }

  /* habit colors */
  .cell.active.yoga   { background: var(--yoga); }
  .cell.active.dog    { background: var(--dog); }
  .cell.active.dj     { background: var(--dj); }
  .cell.active.web    { background: var(--web); }
  .cell.active.toki   { background: var(--toki); }
  .cell.active.code   { background: var(--code); }
  .cell.active.food   { background: var(--food); }
  .cell.active.home   { background: var(--home); }
  .cell.active.cycle  { background: var(--cycle); }
  .cell.active.journal { background: #4A0080; }
  .cell.active.brush  { background: #00B89C; }

  /* mood row */
  .cell.mood-1 { background: var(--mood1); border-color: transparent; }
  .cell.mood-2 { background: var(--mood2); border-color: transparent; }
  .cell.mood-3 { background: var(--mood3); border-color: transparent; }
  .cell.mood-4 { background: var(--mood4); border-color: transparent; }
  .cell.mood-5 { background: var(--mood5); border-color: transparent; }

  .mood-picker {
    display: none;
    position: fixed;
    background: #111;
    border: 1px solid var(--border);
    padding: 8px;
    border-radius: 6px;
    z-index: 100;
    gap: 6px;
    flex-direction: column;
  }

  .mood-picker.show { display: flex; }

  .mood-option {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 10px;
    transition: background 0.1s;
  }

  .mood-option:hover { background: #1a1a1a; }

  .mood-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* mood legend */
  .mood-legend {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 10px;
    color: var(--dim);
    align-items: center;
  }

  .mood-legend-item { display: flex; align-items: center; gap: 4px; }
  .mood-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .stat-box {
    background: #080808;
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 2px;
  }

  .stat-label { font-size: 9px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 700; }
  .stat-sub { font-size: 9px; color: var(--dim); margin-top: 2px; }

  .save-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-top: 16px;
  }

  .save-btn:hover { border-color: var(--dj); color: var(--dj); }

  .section-title {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="prompt">life</span>
    <span class="title">tracker</span>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">← prev</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)">next →</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--dog)"></div>polly walk</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--yoga)"></div>yoga</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00B89C"></div>dry brushing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4A0080"></div>journaling</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--food)"></div>healthy eating</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dj)"></div>dj work</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--code)"></div>strudel</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--toki)"></div>toki pona</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--web)"></div>web / code</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--cycle)"></div>cycle / pms</div>
</div>

<div class="mood-legend">
  <span style="color:var(--dim);margin-right:4px;">mood →</span>
  <div class="mood-legend-item"><div class="mood-legend-dot" style="background:var(--mood1)"></div>terrible</div>
  <div class="mood-legend-item"><div class="mood-legend-dot" style="background:var(--mood2)"></div>bad</div>
  <div class="mood-legend-item"><div class="mood-legend-dot" style="background:var(--mood3)"></div>mixed</div>
  <div class="mood-legend-item"><div class="mood-legend-dot" style="background:var(--mood4)"></div>good</div>
  <div class="mood-legend-item"><div class="mood-legend-dot" style="background:var(--mood5)"></div>great</div>
</div>

<div class="tracker-wrap">
  <table id="trackerTable"></table>
</div>

<div class="stats" id="statsGrid"></div>

<button class="save-btn" onclick="saveData()">↓ save data</button>
<label class="save-btn" style="margin-left:8px;">
  ↑ load data
  <input type="file" accept=".json" onchange="loadData(event)" style="display:none;">
</label>

<!-- mood picker -->
<div class="mood-picker" id="moodPicker">
  <div class="mood-option" onclick="setMood(1)"><div class="mood-dot" style="background:var(--mood1)"></div>terrible</div>
  <div class="mood-option" onclick="setMood(2)"><div class="mood-dot" style="background:var(--mood2)"></div>bad</div>
  <div class="mood-option" onclick="setMood(3)"><div class="mood-dot" style="background:var(--mood3)"></div>mixed</div>
  <div class="mood-option" onclick="setMood(4)"><div class="mood-dot" style="background:var(--mood4)"></div>good</div>
  <div class="mood-option" onclick="setMood(5)"><div class="mood-dot" style="background:var(--mood5)"></div>great</div>
  <div class="mood-option" onclick="setMood(0)" style="color:#444">✕ clear</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://anczpdpuytvnyvfqjzup.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_hmKMc2OM8oP8FdVva7Wyzg_id8-3_P5';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function icon(d) {
    return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px">${d}</svg>`;
  }

  const HABITS = [
    { key: 'walk',    label: icon('<circle cx="9" cy="7" r="2" fill="currentColor" stroke="none"/><circle cx="15" cy="7" r="2" fill="currentColor" stroke="none"/><circle cx="5.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="18.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><ellipse cx="12" cy="18" rx="5.5" ry="4" fill="currentColor" stroke="none"/>') + 'polly walk', cls: 'dog' },
    { key: 'yoga',    label: icon('<circle cx="12" cy="4" r="2"/><path d="M6 10c2-2 4-3 6-3s4 1 6 3"/><path d="M3 16c3-2 6-3 9-3s6 1 9 3"/><path d="M9.5 7.5L8 14M14.5 7.5L16 14"/>') + 'yoga', cls: 'yoga' },
    { key: 'brush',   label: icon('<path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94C5.79 16.2 5 18.45 5 20a7 7 0 0 0 2-.5 5 5 0 0 0 2.5-2.5c.29-.6.5-1.3.5-2 0-.8-.2-1.5-.93-1.5-.73 0-1.5.7-2 1.44z"/>') + 'dry brushing', cls: 'brush' },
    { key: 'journal', label: icon('<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>') + 'journaling', cls: 'journal' },
    { key: 'healthy', label: icon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>') + 'healthy eating', cls: 'food' },
    { key: 'dj',      label: icon('<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>') + 'dj work', cls: 'dj' },
    { key: 'strudel', label: icon('<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>') + 'strudel', cls: 'code' },
    { key: 'toki',    label: icon('<path d="M12 22V12"/><path d="M12 12C12 7 8 3 3 3c0 5 4 9 9 9"/><path d="M12 12c0-5 4-9 9-9-1 5-4 9-9 9"/>') + 'toki pona', cls: 'toki' },
    { key: 'web',     label: icon('<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>') + 'web / code', cls: 'web' },
    { key: 'cycle',   label: icon('<path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>') + 'cycle / pms', cls: 'cycle' },
    { key: 'mood',    label: icon('<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>') + 'mood', cls: 'mood' },
  ];

  let currentYear, currentMonth;
  let data = {};
  let activeMoodCell = null;

  // ── SUPABASE ──────────────────────────────────
  async function loadFromSupabase() {
    const { data: rows } = await sb.from('tracker').select('*');
    if (rows) {
      rows.forEach(row => { data[row.date] = row.data; });
    }
    buildTable();
  }

  async function saveToSupabase(dateKey) {
    const dayData = data[dateKey] || {};
    await sb.from('tracker').upsert({ date: dateKey, data: dayData }, { onConflict: 'date' });
  }

  function today() {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth(), d: d.getDate() };
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function getDay(y, m, d) {
    const k = dateKey(y, m, d);
    if (!data[k]) data[k] = {};
    return data[k];
  }

  function daysInMonth(y, m) {
    return new Date(y, m+1, 0).getDate();
  }

  function buildTable() {
    const t = today();
    const days = daysInMonth(currentYear, currentMonth);
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('monthLabel').textContent = `${monthNames[currentMonth]} ${currentYear}`;

    let html = '<thead><tr><th class="habit-label">habit</th>';
    for (let d = 1; d <= days; d++) {
      const isToday = d === t.d && currentMonth === t.m && currentYear === t.y;
      html += `<th style="${isToday ? 'color:var(--text)' : ''}">${d}</th>`;
    }
    html += '<th style="color:var(--dim);padding-left:8px;">%</th></tr></thead><tbody>';

    HABITS.forEach(habit => {
      html += `<tr><td class="habit-name" style="color:${habit.key === 'mood' ? 'var(--dim)' : `var(--${habit.cls === 'brush' ? 'home' : habit.cls === 'journal' ? 'visa' : habit.cls})`}">${habit.label}</td>`;
      let count = 0;
      for (let d = 1; d <= days; d++) {
        const k = dateKey(currentYear, currentMonth, d);
        const dayData = data[k] || {};
        const isToday = d === t.d && currentMonth === t.m && currentYear === t.y;
        const isFuture = new Date(currentYear, currentMonth, d) > new Date(t.y, t.m, t.d);

        if (habit.key === 'mood') {
          const moodVal = dayData.mood || 0;
          if (moodVal > 0) count++;
          html += `<td><div class="cell ${moodVal > 0 ? `mood-${moodVal}` : ''} ${isToday ? 'today' : ''}" 
            onclick="${isFuture ? '' : `openMoodPicker(event, '${k}')`}" 
            style="${isFuture ? 'opacity:0.2;cursor:default' : ''}"
            title="${moodVal > 0 ? ['','terrible','bad','okay','good','great'][moodVal] : ''}">
            ${moodVal > 0 ? moodVal : ''}</div></td>`;
        } else {
          const active = dayData[habit.key] || false;
          if (active) count++;
          html += `<td><div class="cell ${active ? `active ${habit.cls}` : ''} ${isToday ? 'today' : ''}"
            onclick="${isFuture ? '' : `toggleHabit('${k}', '${habit.key}', '${habit.cls}', this)`}"
            style="${isFuture ? 'opacity:0.2;cursor:default' : ''}"></div></td>`;
        }
      }
      const pct = Math.round(count / days * 100);
      const color = pct >= 70 ? 'var(--mood5)' : pct >= 40 ? 'var(--mood3)' : 'var(--mood1)';
      html += `<td style="padding-left:8px;color:${color};font-size:10px;">${pct}%</td></tr>`;
    });

    html += '</tbody>';
    document.getElementById('trackerTable').innerHTML = html;
    buildStats();
  }

  function toggleHabit(k, habitKey, cls, el) {
    if (!data[k]) data[k] = {};
    data[k][habitKey] = !data[k][habitKey];
    if (data[k][habitKey]) {
      el.classList.add('active', cls);
    } else {
      el.classList.remove('active', cls);
    }
    saveToSupabase(k);
    buildStats();
  }

  let pendingMoodKey = null;

  function openMoodPicker(e, k) {
    pendingMoodKey = k;
    const picker = document.getElementById('moodPicker');
    picker.style.left = (e.clientX + 5) + 'px';
    picker.style.top = (e.clientY + 5) + 'px';
    picker.classList.add('show');
    e.stopPropagation();
  }

  function setMood(val) {
    if (!pendingMoodKey) return;
    if (!data[pendingMoodKey]) data[pendingMoodKey] = {};
    data[pendingMoodKey].mood = val;
    saveToSupabase(pendingMoodKey);
    document.getElementById('moodPicker').classList.remove('show');
    buildTable();
  }

  document.addEventListener('click', () => {
    document.getElementById('moodPicker').classList.remove('show');
  });

  function buildStats() {
    const t = today();
    const days = daysInMonth(currentYear, currentMonth);
    const passedDays = currentYear === t.y && currentMonth === t.m ? t.d : days;

    let html = '';
    HABITS.filter(h => h.key !== 'mood').forEach(habit => {
      let count = 0;
      for (let d = 1; d <= passedDays; d++) {
        const k = dateKey(currentYear, currentMonth, d);
        if (data[k] && data[k][habit.key]) count++;
      }
      const pct = Math.round(count / passedDays * 100);
      const color = pct >= 70 ? 'var(--mood5)' : pct >= 40 ? 'var(--mood3)' : 'var(--mood1)';
      html += `<div class="stat-box">
        <div class="stat-label">${habit.label}</div>
        <div class="stat-value" style="color:${color}">${count}</div>
        <div class="stat-sub">${pct}% of ${passedDays} days</div>
      </div>`;
    });

    // avg mood
    let moodSum = 0, moodCount = 0;
    for (let d = 1; d <= passedDays; d++) {
      const k = dateKey(currentYear, currentMonth, d);
      if (data[k] && data[k].mood) { moodSum += data[k].mood; moodCount++; }
    }
    const avgMood = moodCount > 0 ? (moodSum / moodCount).toFixed(1) : '—';
    const moodColor = avgMood >= 4 ? 'var(--mood5)' : avgMood >= 3 ? 'var(--mood3)' : 'var(--mood1)';
    html += `<div class="stat-box">
      <div class="stat-label">${icon('<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>')}avg mood</div>
      <div class="stat-value" style="color:${moodColor}">${avgMood}</div>
      <div class="stat-sub">tracked ${moodCount} days</div>
    </div>`;

    document.getElementById('statsGrid').innerHTML = html;
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    buildTable();
  }

  function saveData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tracker-data.json';
    a.click();
  }

  function loadData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        data = JSON.parse(ev.target.result);
        buildTable();
      } catch { alert('invalid file!'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // init
  const t = today();
  currentYear = t.y;
  currentMonth = t.m;
  loadFromSupabase();
</script>
</body>
</html>
